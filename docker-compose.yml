services:
  postgres:
    image: postgres:17-alpine
    container_name: padalix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: padalix
      POSTGRES_USER: padalix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-padalix-local-only}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - padalix_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padalix -d padalix"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  padalix_postgres_data:
